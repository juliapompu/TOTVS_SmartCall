# ============================================================
# TOTVS SMARTCALL - CONFIGURAÇÕES DA APLICAÇÃO
# IMPORTANTE: Substitua os valores entre < > com os seus dados reais
# ============================================================

# ------------------------------------------------------------
# NOME E PORTA DA APLICAÇÃO
# O backend vai rodar em http://localhost:8080
# ------------------------------------------------------------
spring.application.name=smartcall
server.port=8080

# ------------------------------------------------------------
# CONEXÃO COM O BANCO DE DADOS ORACLE
# Substitua com os dados do seu banco Oracle
# Formato da URL: jdbc:oracle:thin:@HOST:PORTA:NOME_DO_BANCO
# Exemplo FIAP: jdbc:oracle:thin:@oracle.fiap.com.br:1521:ORCL
# ------------------------------------------------------------
spring.datasource.url=jdbc:oracle:thin:@<HOST_DO_BANCO>:<PORTA>:<SID_OU_SERVICE_NAME>
spring.datasource.username=<SEU_USUARIO_ORACLE>
spring.datasource.password=<SUA_SENHA_ORACLE>
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# ------------------------------------------------------------
# CONFIGURAÇÕES DO JPA / HIBERNATE
# ------------------------------------------------------------
# Dialeto do Oracle para o Hibernate gerar SQL corretamente
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect

# NUNCA use 'create' ou 'create-drop' com dados reais!
# 'validate' = só valida se as tabelas existem (mais seguro)
# 'none' = não faz nada no banco ao iniciar
spring.jpa.hibernate.ddl-auto=validate

# Mostra as queries SQL no console (útil para debug, desative em produção)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ------------------------------------------------------------
# CHAVES DE API DE INTELIGÊNCIA ARTIFICIAL
# Coloque aqui as chaves das IAs que você for usar
# NUNCA suba essas chaves para o GitHub!
# ------------------------------------------------------------

# --- OPENAI (ChatGPT / Whisper) ---
# Obtenha em: https://platform.openai.com/api-keys
ai.openai.api-key=<SUA_CHAVE_OPENAI>
ai.openai.model=gpt-4o-mini
ai.openai.whisper-model=whisper-1
ai.openai.base-url=https://api.openai.com/v1

# --- GOOGLE GEMINI ---
# Obtenha em: https://aistudio.google.com/app/apikey
ai.gemini.api-key=<SUA_CHAVE_GEMINI>
ai.gemini.model=gemini-1.5-flash
ai.gemini.base-url=https://generativelanguage.googleapis.com/v1beta

# --- QUAL IA USAR (openai ou gemini) ---
# Troque aqui para alternar entre as IAs sem mudar código
ai.provider=openai

# ------------------------------------------------------------
# CORS - Permite que o React (localhost:3000) acesse o backend
# ------------------------------------------------------------
cors.allowed-origins=http://localhost:3000

# ------------------------------------------------------------
# TAMANHO MÁXIMO DE UPLOAD (para envio de arquivos de áudio)
# ------------------------------------------------------------
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
